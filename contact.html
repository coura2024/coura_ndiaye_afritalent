  <main style=" padding-top: 90px;">
  <div class="container fade-in py-5">
    <h2 class="text-center mb-4 text-info">Contactez-nous</h2>
    <div class="row">
      <!--formulaire-->
      <div class="col-md-6">
        <form id="contactForm" class="row  g-2">
          <div class="mb-3">
            <label >Nom</label>
            <input type="text" id="nom" class="form-control">
            <small class="error" id="error-nom"></small>
          </div>
          <div class="mb-3">
            <label >Prenom</label>
            <input type="text" id="prenom" class="form-control">
            <small class="error" id="error-prenom"></small>
          </div>
          <div class="mb-3">
            <label >Email</label>
            <input type="email" id="email" class="form-control" placeholder="nom@gmail.com ">
            <small class="error" id="error-email"></small>
          </div>
          <div class="mb-3">
            <label>Sujet</label>
            <select id="sujet" class="form-control">
              <option value="">Choisir un sujet</option>
              <option>Freelance</option>
              <option>Support</option>
              <option>Entreprise</option>
            </select>
            <small class="error" id="error-sujet"></small>
          </div>
          <div class="mb-3">
            <label >Message</label>
            <textarea class="form-control" id="message" placeholder="votre message"></textarea>
            <small class="error" id="error-message"></small>
          </div>
          <button type="submit" class="btn btn-info text-white">Envoyer</button>
          <div id="success" class="success"></div>
        </form>
          </div>
      </div>
      <!--contact--> 
      <div class="contact" class="col-md-6">
        <h4 class="text-info mt-5">Informations</h4>
        <p>Email : contact@afritalent.com</p>
        <p>Tel : 33 957 33 41</p>
        <P>Adresse : Mbour, Senegal</P>
